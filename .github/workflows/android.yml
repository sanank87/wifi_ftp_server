name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: WifiFTPServer-Android

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Write gradle.properties
        run: |
          echo "android.useAndroidX=true" >> gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          echo "org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8" >> gradle.properties
          cat gradle.properties

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      - name: Build debug APK
        run: gradle assembleDebug --no-daemon 2>&1 | tee build.log; grep -A 3 "error:" build.log | head -50

      - name: Show Kotlin errors
        if: failure()
        run: find . -name "*.log" -path "*/reports/*" | xargs cat 2>/dev/null || grep -r "error:" build.log | head -50

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: wifi-ftp-server-debug
          path: WifiFTPServer-Android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
